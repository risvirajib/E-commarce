<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risvi World - Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>

<link rel="shortcut icon" href="./image/flash.jpeg" type="image/x-icon">

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: #565659;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f8ebeb;
    }

    .signup-box {
      background: rgba(62, 62, 83, 0.95);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.5);
      width: 380px;
      text-align: center;
    }

    .signup-box h2 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #eef5f5;
      text-shadow: 0 0 8px #646969;
    }

    .signup-box input {
      width: 100%;
      padding: 12px 15px;
      margin: 12px 0;
      border: none;
      border-radius: 8px;
      background: #1c1c2c;
      color: #fff;
      font-size: 16px;
      outline: none;
      box-shadow: inset 0 0 8px rgba(178, 183, 183, 0.3);
      transition: 0.3s;
    }

    .signup-box input:focus {
      box-shadow: 0 0 12px #080808, inset 0 0 10px #00fff7;
    }

    .signup-box button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #e3e5eb;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      color: #000007;
      box-shadow: 0 0 15px #090909, 0 0 25px #4c4e4e;
      transition: 0.3s;
    }

    .signup-box button:hover {
      background: #979d9d;
      box-shadow: 0 0 25px #1b1c1c, 0 0 35px #000000;
    }

    .signup-box p {
      margin-top: 20px;
      font-size: 14px;
    }

    .signup-box a {
      color: #8e8888;
      text-decoration: none;
      font-weight: 500;
    }

    .signup-box a:hover {
      text-shadow: 0 0 8px #0e0f0f;
    }
  </style>
</head>
 <body  class="min-h-screen flex items-center justify-center bg-cover bg-center" style="background-image: url('/image/erol-ahmed-IHL-Jbawvvo-unsplash.jpg'); background-repeat: no-repeat; background-size: cover;">

 <div class="signup-box bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl shadow-2xl p-8 w-[90%] sm:w-[420px] text-white relative z-10 w-full max-w-sm sm:max-w-md bg-white/10 border border-white/20 rounded-3xl backdrop-blur-2xl shadow-2xl p-6 sm:p-8 text-white "
      <h2>
    <h2>📝 Create Account</h2>
    <form>
      <input type="text" placeholder="পূর্ণ নাম" required>
      <input type="email" placeholder="ইমেইল ঠিকানা" required>
      <input type="text" placeholder="ইউজারনেম" required>
      <input type="password" placeholder="পাসওয়ার্ড" required>
      <input type="password" placeholder="পাসওয়ার্ড নিশ্চিত করুন" required>
      <button type="submit"> <a href="login.html" style="color: #1c1c2c;">Sign Up</a></button>
    </form>
    <p>আগেই অ্যাকাউন্ট আছে? <a href="login.html">Login</a></p>
  </div>
</body>
</html>
